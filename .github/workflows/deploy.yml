name: Deploy to rtgarden.com

# Runs on every push to main
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Upload files to server
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -e rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude 'DEPLOY.sh' \
            --exclude '.DS_Store' \
            --exclude '*.py' \
            --exclude '.github' \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/teahouse/

      - name: Copy to web root with sudo
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "echo $SSHPASS | sudo -S cp -r /tmp/teahouse/* /var/www/html/ && sudo chown -R www-data:www-data /var/www/html/ && sudo chmod -R 755 /var/www/html/ && rm -rf /tmp/teahouse"
