name: Deploy to rtgarden.com

# Runs on every push to main
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via rsync with password
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -e rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no" \
            --delete \
            --exclude '.git' \
            --exclude 'DEPLOY.sh' \
            --exclude '.DS_Store' \
            --exclude '*.py' \
            --exclude '.github' \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/html/
