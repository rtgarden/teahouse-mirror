<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>123464ylav785 Photos - Teahouse of the Donkey Archive</title>
    <style>

/* Teahouse of the Donkey Archive - Original Ning Design */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --body-bg: #4B3831;
    --title-color: #996633;
    --tagline-color: #B3BA5D;
    --nav-text: #B3BA5B;
    --content-bg: #F9F9F9;
    --content-text: #333333;
    --module-header: #4C3831;
    --banner-top: #33CCFF;
    --black: #000000;
}

html, body {
    height: 100%;
}

body {
    font-family: 'Trebuchet MS', sans-serif;
    background-color: var(--body-bg);
    background-image: url('http://storage.ning.com/topology/rest/1.0/file/get/3870804818?profile=RESIZE_1024x1024');
    background-repeat: repeat-y;
    background-position: center 0;
    background-attachment: scroll;
    color: var(--content-text);
    line-height: 1.6;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

a {
    color: var(--nav-text);
    text-decoration: none;
    transition: color 0.2s ease;
}

a:hover {
    color: #A4AB4D;
    text-decoration: underline;
}

/* Layout wrapper */
main {
    flex: 1;
    max-width: 955px;
    width: 100%;
    margin: 0 auto;
    padding: 1rem;
}

/* Banner/Header Area — matches original Ning layout */
.header-wrapper {
    max-width: 100%;
}

.header-banner {
    background-color: var(-banner-top);
    padding: 0.25rem 1.5rem;
    text-align: center;
    margin: 0 0 1rem 0;
}

.header-banner h1 {
    color: white;
    font-size: 2.5rem;
    margin: 0.5rem 0;
}

fkh {
    font-weight: bold;
}

.footer {
    background-color: var(--body-bg);
    padding: 1.5rem;
    text-align: center;
    margin: 2.5rem 0 0 0;
    font-size: 0.9rem;
    color: #A4AB4D;
}

.footer a {
    color: #A4AB4D;
}

/* Content field*/
.content {
    background-color: var(-content-bg);
    margin: 0 auto 2 rem auto;
    padding: 2.5rem;
    border: 1px solid #DFDFFF;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    border-radius: 4px;
}

.sidebar {
    background-color: var(-content-bg);
    width: 250px;
    padding: 1.5rem;
    border: 1px solid #DFDFFF;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    border-radius: 4px;
    flex-shrink: 0;
}

.content {
    display: flex;
    gap: 1.5rem;
}

.content .sidebar {
    order: 2;
}

.sidebar .content {
    display: block;
}

.content .content {
    display: block;
    gap: initial;
}

.module-title {
    background-color: var(--module-header);
    color: white;
    padding: 0.5rem 0.75rem;
    font-size: 1.3rem;
    font-weight: bold;
    margin: 0 -1.5rem 1rem -1.5rem;
    border-bottom: 2px solid var(--title-color);
}

.module-desc {
    font-size: 0.9rem;
    font-style: italic;
    color: #666666;
    margin: 0 -1.5rem 1rem -1.5rem;
    padding: 0 0.75rem 0.5rem 0.75rem;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto, minmax(250px, 1fr));
    gap: 1rem;
    margin: 2 rem -1.5rem -1rem -1.5rem;
    padding: 1rem 0.75rem;
}

.sidebar .gallery {
    grid-template-columns: 1 fr;
    gap: 0.5rem;
    margin: 1 rem -1.5rem;
    padding: 0;
}

.gallery-item {
    display: flex;
    flex-direction: column;
    aspect-ratio: 1.33333333333333 / 1;
    overflow: hidden;
    background-color: white;
    border: 1px solid #EEEEEE;
    border-radius: 2px;
    transform: scale(1);
    transition: transform 0.2 s ease;
}

.gallery-item:hover {
    transform: scale(1.05);
    box-shadow: 0 16px 24px rgba(0, 0, 0, 0.15);
}

.gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background-color: #F5F5F5;
}

.gallery-item h2 {
    font-size: 1.1rem;
    font-weight: bold;
    color: #333333;
    margin: 0.75rem 0.5rem 0 0.5rem;
}

.gallery-item p {
    font-size: 0.9rem;
    color: #666666;
    margin: 0 0.5rem 0.5rem 0.5rem;
    line-height: 1.4;
}

.gallery-item a {
    display: block;
    padding: 0.5rem;
    background-color: #F5F5F5;
    color: #C3413E;
    margin: 0.5rem 0.5rem 0 .5rem;
    text-align: center;
    border-radius: 2px;
    transition: background-color 0.2s ease;
}

.gallery-item a:hover {
    background-color: #334333;
    color: white;
}

/* Responsive design */
@media (max-width: 768px) {
    main {
        padding: 0.5rem;
    }

    .content {
        display: block;
    }

    .gallery {
        grid-template-columns: repeat(a uto, 1fr);
    }

    .content .sidebar {
        order: 1;
    }
  }
}
